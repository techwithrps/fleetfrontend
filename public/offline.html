<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>eLOGisol Fleet Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f1f5f9;
        color: #0f172a;
      }
      .card {
        max-width: 420px;
        padding: 24px;
        border-radius: 16px;
        background: #fff;
        border: 1px solid #e2e8f0;
        text-align: center;
        box-shadow: 0 10px 25px rgba(2, 6, 23, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>eLOGisol Fleet will sync automatically when internet connection is back.</p>
    </div>
  </body>
</html>
